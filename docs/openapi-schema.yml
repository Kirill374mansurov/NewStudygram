openapi: 3.0.2

info:
  title: Studygram API
  version: "1.0.0"
  description: API платформы для создания, поиска и сохранения учебных материалов.

paths:
  /api/users/:
    get:
      operationId: Список пользователей
      description: Получение списка пользователей.
      parameters:
        - name: page
          required: false
          in: query
          description: Номер страницы.
          schema:
            type: integer
        - name: limit
          required: false
          in: query
          description: Количество объектов на странице.
          schema:
            type: integer
      responses:
        "200":
          description: Список пользователей.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUserList"
      tags:
        - Пользователи

    post:
      operationId: Регистрация пользователя
      description: Создание нового пользователя.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomUserCreate"
      responses:
        "201":
          description: Пользователь успешно создан.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomUserResponseOnCreate"
        "400":
          $ref: "#/components/responses/ValidationError"
      tags:
        - Пользователи

  /api/users/me/:
    get:
      operationId: Текущий пользователь
      description: Получение данных текущего пользователя.
      security:
        - Token: []
      responses:
        "200":
          description: Данные текущего пользователя.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Пользователи

  /api/users/{id}/:
    get:
      operationId: Профиль пользователя
      description: Получение профиля пользователя по id.
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id пользователя.
          schema:
            type: integer
      responses:
        "200":
          description: Профиль пользователя.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Пользователи

  /api/users/me/avatar/:
    put:
      operationId: Добавление аватара
      description: Добавление или обновление аватара текущего пользователя.
      security:
        - Token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAvatar"
      responses:
        "200":
          description: Аватар успешно обновлён.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetAvatarResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Пользователи

    delete:
      operationId: Удаление аватара
      description: Удаление аватара текущего пользователя.
      security:
        - Token: []
      responses:
        "204":
          description: Аватар успешно удалён.
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Пользователи

  /api/users/set_password/:
    post:
      operationId: Изменение пароля
      description: Изменение пароля текущего пользователя.
      security:
        - Token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPassword"
      responses:
        "204":
          description: Пароль успешно изменён.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Пользователи

  /api/auth/token/login/:
    post:
      operationId: Получить токен авторизации
      description: Авторизация пользователя по email и паролю.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenCreate"
      responses:
        "200":
          description: Токен авторизации.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenGetResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
      tags:
        - Авторизация

  /api/auth/token/logout/:
    post:
      operationId: Удаление токена
      description: Выход из аккаунта.
      security:
        - Token: []
      responses:
        "204":
          description: Токен успешно удалён.
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Авторизация

  /api/topics/:
    get:
      operationId: Список тем
      description: Получение списка тем учебных материалов.
      responses:
        "200":
          description: Список тем.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"
      tags:
        - Темы

  /api/topics/{id}/:
    get:
      operationId: Получение темы
      description: Получение темы по id.
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id темы.
          schema:
            type: integer
      responses:
        "200":
          description: Данные темы.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Темы

  /api/materials/:
    get:
      operationId: Список учебных материалов
      description: Получение списка учебных материалов. Доступна фильтрация по избранному, автору и темам.
      parameters:
        - name: page
          required: false
          in: query
          description: Номер страницы.
          schema:
            type: integer
        - name: limit
          required: false
          in: query
          description: Количество объектов на странице.
          schema:
            type: integer
        - name: is_favorited
          required: false
          in: query
          description: Показывать только материалы, добавленные в избранное.
          schema:
            type: integer
            enum: [0, 1]
        - name: author
          required: false
          in: query
          description: Показывать материалы только указанного автора.
          schema:
            type: integer
        - name: topics
          required: false
          in: query
          description: Показывать материалы только с указанными темами по slug.
          example: "python&topics=django"
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Список учебных материалов.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMaterialList"
      tags:
        - Материалы

    post:
      operationId: Создание учебного материала
      description: Создание учебного материала. Доступно только авторизованному пользователю.
      security:
        - Token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialCreate"
      responses:
        "201":
          description: Материал успешно создан.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Материалы

  /api/materials/{id}/:
    get:
      operationId: Получение учебного материала
      description: Получение учебного материала по id.
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id материала.
          schema:
            type: integer
      responses:
        "200":
          description: Данные учебного материала.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Материалы

    patch:
      operationId: Обновление учебного материала
      description: Обновление учебного материала. Доступно только автору.
      security:
        - Token: []
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id материала.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialUpdate"
      responses:
        "200":
          description: Материал успешно обновлён.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Материалы

    delete:
      operationId: Удаление учебного материала
      description: Удаление учебного материала. Доступно только автору.
      security:
        - Token: []
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id материала.
          schema:
            type: integer
      responses:
        "204":
          description: Материал успешно удалён.
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Материалы

  /api/materials/{id}/favorite/:
    post:
      operationId: Добавить материал в избранное
      description: Добавление учебного материала в избранное.
      security:
        - Token: []
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id материала.
          schema:
            type: integer
      responses:
        "201":
          description: Материал успешно добавлен в избранное.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialMinified"
        "400":
          $ref: "#/components/responses/SelfMadeError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Избранное

    delete:
      operationId: Удалить материал из избранного
      description: Удаление учебного материала из избранного.
      security:
        - Token: []
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id материала.
          schema:
            type: integer
      responses:
        "204":
          description: Материал успешно удалён из избранного.
        "400":
          $ref: "#/components/responses/SelfMadeError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Избранное

  /api/materials/{id}/get-link/:
    get:
      operationId: Получить короткую ссылку на материал
      description: Получение короткой ссылки на учебный материал.
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id материала.
          schema:
            type: integer
      responses:
        "200":
          description: Короткая ссылка на материал.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialGetShortLink"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Материалы

  /api/users/subscriptions/:
    get:
      operationId: Мои подписки
      description: Возвращает пользователей, на которых подписан текущий пользователь. В выдачу добавляются учебные материалы авторов.
      security:
        - Token: []
      parameters:
        - name: page
          required: false
          in: query
          description: Номер страницы.
          schema:
            type: integer
        - name: limit
          required: false
          in: query
          description: Количество объектов на странице.
          schema:
            type: integer
        - name: materials_limit
          required: false
          in: query
          description: Количество материалов внутри поля materials.
          schema:
            type: integer
      responses:
        "200":
          description: Список подписок.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSubscriptionList"
        "401":
          $ref: "#/components/responses/AuthenticationError"
      tags:
        - Подписки

  /api/users/{id}/subscribe/:
    post:
      operationId: Подписаться на пользователя
      description: Подписка на автора учебных материалов.
      security:
        - Token: []
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id пользователя.
          schema:
            type: integer
        - name: materials_limit
          required: false
          in: query
          description: Количество материалов внутри поля materials.
          schema:
            type: integer
      responses:
        "201":
          description: Подписка успешно создана.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithMaterials"
        "400":
          $ref: "#/components/responses/SelfMadeError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Подписки

    delete:
      operationId: Отписаться от пользователя
      description: Удаление подписки на автора.
      security:
        - Token: []
      parameters:
        - name: id
          in: path
          required: true
          description: Уникальный id пользователя.
          schema:
            type: integer
      responses:
        "204":
          description: Успешная отписка.
        "400":
          $ref: "#/components/responses/SelfMadeError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "404":
          $ref: "#/components/responses/NotFound"
      tags:
        - Подписки

components:
  schemas:
    User:
      description: Пользователь платформы Studygram.
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Адрес электронной почты.
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 150
          description: Уникальный username.
          example: study_user
        first_name:
          type: string
          maxLength: 150
          description: Имя.
          example: Иван
        last_name:
          type: string
          maxLength: 150
          description: Фамилия.
          example: Петров
        is_subscribed:
          type: boolean
          readOnly: true
          description: Подписан ли текущий пользователь на этого автора.
          example: false
        avatar:
          type: string
          nullable: true
          format: uri
          description: Ссылка на аватар.
          example: http://studygram.example.org/media/users/avatar.png
      required:
        - username

    UserWithMaterials:
      description: Пользователь с учебными материалами.
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        is_subscribed:
          type: boolean
          readOnly: true
        avatar:
          type: string
          nullable: true
          format: uri
        materials:
          type: array
          items:
            $ref: "#/components/schemas/MaterialMinified"
        materials_count:
          type: integer
          description: Общее количество материалов автора.

    Topic:
      description: Тема учебного материала.
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 64
          description: Название темы.
          example: Python
        slug:
          type: string
          maxLength: 64
          description: Уникальный slug темы.
          example: python
      required:
        - name
        - slug

    Material:
      description: Учебный материал.
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        topics:
          type: array
          readOnly: true
          description: Список тем материала.
          items:
            $ref: "#/components/schemas/Topic"
        author:
          readOnly: true
          $ref: "#/components/schemas/User"
        is_favorited:
          type: boolean
          readOnly: true
          description: Добавлен ли материал в избранное.
        title:
          type: string
          maxLength: 256
          description: Название материала.
          example: Основы Django REST Framework
        description:
          type: string
          description: Краткое описание материала.
          example: Введение в создание REST API на Django.
        content_type:
          type: string
          description: Тип учебного материала.
          example: article
          enum:
            - article
            - video
            - course
            - book
            - documentation
            - other
        link:
          type: string
          format: uri
          description: Ссылка на учебный материал.
          example: https://www.django-rest-framework.org/
        estimated_time:
          type: integer
          nullable: true
          description: Примерное время изучения в минутах.
          example: 60
        level:
          type: string
          nullable: true
          description: Уровень сложности.
          example: beginner
          enum:
            - beginner
            - intermediate
            - advanced
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    MaterialMinified:
      description: Краткое представление учебного материала.
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 256
          description: Название материала.
        link:
          type: string
          format: uri
          description: Ссылка на материал.
        content_type:
          type: string
          description: Тип материала.
        estimated_time:
          type: integer
          nullable: true
          description: Примерное время изучения в минутах.

    MaterialCreate:
      description: Создание учебного материала.
      type: object
      properties:
        topics:
          description: Список id тем.
          type: array
          example: [1, 2]
          items:
            type: integer
        title:
          type: string
          maxLength: 256
          description: Название материала.
        description:
          type: string
          description: Описание материала.
        content_type:
          type: string
          description: Тип материала.
          example: article
        link:
          type: string
          format: uri
          description: Ссылка на материал.
        estimated_time:
          type: integer
          nullable: true
          description: Примерное время изучения в минутах.
        level:
          type: string
          nullable: true
          description: Уровень сложности.
      required:
        - topics
        - title
        - description
        - content_type
        - link

    MaterialUpdate:
      description: Обновление учебного материала.
      type: object
      properties:
        topics:
          description: Список id тем.
          type: array
          example: [1, 2]
          items:
            type: integer
        title:
          type: string
          maxLength: 256
          description: Название материала.
        description:
          type: string
          description: Описание материала.
        content_type:
          type: string
          description: Тип материала.
        link:
          type: string
          format: uri
          description: Ссылка на материал.
        estimated_time:
          type: integer
          nullable: true
          description: Примерное время изучения в минутах.
        level:
          type: string
          nullable: true
          description: Уровень сложности.

    MaterialGetShortLink:
      type: object
      properties:
        short-link:
          type: string
          description: Короткая ссылка на материал.
          format: uri
          example: https://studygram.example.org/s/3d0

    CustomUserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          example: user@example.com
        username:
          type: string
          maxLength: 150
          example: study_user
        first_name:
          type: string
          maxLength: 150
          example: Иван
        last_name:
          type: string
          maxLength: 150
          example: Петров
        password:
          type: string
          example: Qwerty123
      required:
        - username
        - password
        - first_name
        - last_name
        - email

    CustomUserResponseOnCreate:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
        - username
        - first_name
        - last_name
        - email

    SetAvatar:
      type: object
      properties:
        avatar:
          type: string
          format: binary
          description: Картинка, закодированная в Base64.
          example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAB...
      required:
        - avatar

    SetAvatarResponse:
      type: object
      properties:
        avatar:
          type: string
          format: uri
          description: Ссылка на аватар.
          example: http://studygram.example.org/media/users/avatar.png

    SetPassword:
      type: object
      properties:
        new_password:
          type: string
        current_password:
          type: string
      required:
        - new_password
        - current_password

    TokenCreate:
      type: object
      properties:
        password:
          type: string
        email:
          type: string
          format: email
      required:
        - password
        - email

    TokenGetResponse:
      type: object
      properties:
        auth_token:
          type: string

    PaginatedUserList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
        previous:
          type: string
          nullable: true
          format: uri
        results:
          type: array
          items:
            $ref: "#/components/schemas/User"

    PaginatedMaterialList:
      type: object
      properties:
        count:
          type: integer
          example: 123
